name: Release

# Push to main -> STABLE release  (clean version, latest.yml).
# Push to dev  -> BETA prerelease (X.Y.Z-beta.N, beta.yml + latest.yml).
on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

# per-branch group so a stable (main) and a beta (dev) build never cancel each other
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # the tag step below pushes with the checkout's GITHUB_TOKEN credentials
          persist-credentials: true

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve channel + version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # package.json carries the NEXT stable version (e.g. 0.1.0). A push to
          # main ships it verbatim; every dev push ships <base>-beta.<run>, which
          # semver-sorts below the stable it leads up to. After promoting a
          # stable, bump package.json on dev before the next promote.
          BASE=$(node -p "require('./package.json').version")
          if [ "${{ github.ref_name }}" = "dev" ]; then
            CHANNEL=beta
            # the prerelease tag makes electron-builder write beta.yml
            # (+ latest.yml via generateUpdatesFilesForAllChannels)
            VERSION="${BASE}-beta.${{ github.run_number }}"
            PRERELEASE_FLAG="--prerelease"
          else
            CHANNEL=stable
            VERSION="$BASE"
            PRERELEASE_FLAG=""
          fi
          if gh release view "v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release v$VERSION already exists — bump the version in package.json before promoting."
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "CHANNEL=$CHANNEL" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PRERELEASE_FLAG=$PRERELEASE_FLAG" >> "$GITHUB_ENV"
          echo "Building Splat Studio v$VERSION ($CHANNEL)"

      - name: Stage bundled Node runtime
        run: npm run fetch-node

      - name: Build client
        run: npm run build

      - name: Push release tag + draft release
        # electron-builder 26 publishes the release directly (GitHub rejects that
        # without an existing tag ref) and its parallel upload tasks race creating the
        # release, splitting assets across duplicates — pre-create the tag and a draft
        # (marked prerelease for beta) so every task reuses the same release.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --draft $PRERELEASE_FLAG --title "$VERSION" --notes "Uploading artifacts..."

      - name: Package and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Publish the draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v$VERSION" --draft=false $PRERELEASE_FLAG

      - name: Annotate release with versions + changelog
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver() { node -e "console.log(require('fs').readFileSync('node_modules/$1/package.json','utf8').match(/\"version\":\s*\"([^\"]+)\"/)[1])"; }
          PC=$(ver playcanvas)
          ST=$(ver @playcanvas/splat-transform)

          # changelog diff base: stable diffs against the last stable (so notes cover
          # every promoted change, not just since the latest beta); beta against any release
          if [ "$CHANNEL" = "stable" ]; then
            PREV_FILTER='select(.isPrerelease | not)'
          else
            PREV_FILTER='.'
          fi
          PREV=$(gh release list --limit 100 --json tagName,isPrerelease \
            -q "[.[] | select(.tagName != \"v$VERSION\") | $PREV_FILTER] | first | .tagName")

          # GitHub's auto-generated changelog (merged PRs / commits since PREV)
          if [ -n "$PREV" ] && [ "$PREV" != "null" ]; then
            CHANGELOG=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="v$VERSION" -f previous_tag_name="$PREV" -q .body)
          else
            CHANGELOG=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="v$VERSION" -q .body)
          fi

          {
            echo "**Channel: $CHANNEL** — built with **PlayCanvas $PC** and **@playcanvas/splat-transform $ST**."
            echo
            echo "### Downloads (Windows)"
            # list the .exe assets electron-builder actually uploaded (drift-proof)
            gh release view "v$VERSION" --json assets \
              -q '.assets[] | select(.name | endswith(".exe")) | "- **" + .name + "**"'
            echo
            printf '%s\n' "$CHANGELOG"
          } > release-notes.md

          gh release edit "v$VERSION" --notes-file release-notes.md

      - name: Summary
        shell: bash
        run: echo "Published $CHANNEL release v$VERSION (NSIS installer + portable exe)." >> "$GITHUB_STEP_SUMMARY"
