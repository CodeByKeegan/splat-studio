name: Release

# Every push/merge to main builds the Windows app and publishes a GitHub Release.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# never let two releases race for the same tag
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # the tag step below pushes with the checkout's GITHUB_TOKEN credentials
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set release version (0.1.<run number>)
        shell: bash
        run: |
          VERSION="0.1.${{ github.run_number }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building Splat Studio v$VERSION"

      - name: Stage bundled Node runtime
        run: npm run fetch-node

      - name: Build client
        run: npm run build

      - name: Push release tag
        # electron-builder 26 creates the release as published, which GitHub
        # rejects (422) unless the tag ref already exists
        shell: bash
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Package and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Annotate release with versions + changelog
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver() { node -e "console.log(require('fs').readFileSync('node_modules/$1/package.json','utf8').match(/\"version\":\s*\"([^\"]+)\"/)[1])"; }
          PC=$(ver playcanvas)
          ST=$(ver @playcanvas/splat-transform)

          # most recent release that isn't the one we just published (for the changelog diff)
          PREV=$(gh release list --limit 30 --json tagName \
            -q "[.[] | select(.tagName != \"v$VERSION\")] | first | .tagName")

          # GitHub's auto-generated changelog (merged PRs / commits since PREV)
          if [ -n "$PREV" ] && [ "$PREV" != "null" ]; then
            CHANGELOG=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="v$VERSION" -f previous_tag_name="$PREV" -q .body)
          else
            CHANGELOG=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="v$VERSION" -q .body)
          fi

          {
            echo "Built with **PlayCanvas $PC** and **@playcanvas/splat-transform $ST**."
            echo
            echo "### Downloads (Windows)"
            # list the .exe assets electron-builder actually uploaded (drift-proof)
            gh release view "v$VERSION" --json assets \
              -q '.assets[] | select(.name | endswith(".exe")) | "- **" + .name + "**"'
            echo
            printf '%s\n' "$CHANGELOG"
          } > release-notes.md

          gh release edit "v$VERSION" --notes-file release-notes.md

      - name: Summary
        shell: bash
        run: echo "Published release v$VERSION (NSIS installer + portable exe)." >> "$GITHUB_STEP_SUMMARY"
