site_name: Splat Studio
site_description: A local desktop GUI for @playcanvas/splat-transform — Gaussian-splat conversion, SOG bundling, LOD, collision meshes, and a PlayCanvas 3D viewer.
site_author: CodeByKeegan
# Project site: https://<user>.github.io/<repo>/ (GitHub lowercases the user subdomain).
site_url: https://codebykeegan.github.io/splat-studio/
repo_url: https://github.com/CodeByKeegan/splat-studio
repo_name: CodeByKeegan/splat-studio
edit_uri: edit/main/docs/

# Reuse the existing docs/ folder as-is.
docs_dir: docs

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.tabs.link
    - toc.follow

nav:
  - Home: index.md
  - User Guide: USER_GUIDE.md
  - MCP Setup: MCP_SETUP.md
  - MCP Workflows: MCP_WORKFLOWS.md
  - Automation: AUTOMATION.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Mermaid: renders the flowchart/sequenceDiagram fences in AUTOMATION.md.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# Links to source files outside docs/ (e.g. server/index.mjs) are expected; warn, don't fail.
validation:
  links:
    absolute_links: ignore
    unrecognized_links: ignore
    not_found: warn
